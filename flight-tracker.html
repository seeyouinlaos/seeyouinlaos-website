<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Tracker · See You In Laos</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%232B2823'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23B33A3F'/%3E%3C/svg%3E">
<style>
@font-face { font-family:'PP Editorial Old'; src:url('PPEditorialOld-Ultralight.otf') format('opentype'); font-weight:200; font-style:normal; font-display:swap; }
@font-face { font-family:'PP Editorial Old'; src:url('PPEditorialOld-Regular.otf') format('opentype'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'PP Editorial Old'; src:url('PPEditorialOld-Italic.otf') format('opentype'); font-weight:400; font-style:italic; font-display:swap; }
:root{
  --ivory:#F2ECE1; --ink:#211F1C; --ink-s:#2B2823; --blush:#EAD9D4;
  --rose:#805A52; --cherry:#74070E; --cherry-photo:#B33A3F;
  --card:#FBF8F2; --line:rgba(168,131,125,.28); --line-strong:rgba(168,131,125,.5);
  --serif:'PP Editorial Old', Georgia, 'Times New Roman', serif;
  --sans:system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --good:#2f6f4f; --warn:#9a6b1e;
  --z-menu:40; --z-sticky:30;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--ivory); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
body{ line-height:1.5; font-size:15px; }
a{ color:var(--cherry); text-decoration:none; }
button{ font-family:inherit; cursor:pointer; color:inherit; }
img{ max-width:100%; }
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{ outline:2px solid var(--cherry); outline-offset:2px; }
@media (prefers-reduced-motion: reduce){ *{ transition:none !important; animation:none !important; } }
.eyebrow{ font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--rose); }
.serif{ font-family:var(--serif); font-weight:200; }

.topbar{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; padding:20px clamp(16px,4vw,44px); border-bottom:1px solid var(--line); flex-wrap:wrap; }
.brand{ font-family:var(--serif); font-weight:400; font-size:22px; }
.brand .dot{ color:var(--cherry-photo); }
.brand small{ display:block; font-family:var(--sans); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--rose); margin-top:3px; }
.topbar .back{ font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--rose); }
.topbar .back:hover{ color:var(--cherry); }

.wrap{ max-width:1080px; margin:0 auto; padding:26px clamp(16px,4vw,44px) 90px; }

/* buttons */
.btn{ display:inline-flex; align-items:center; gap:8px; border:1px solid var(--ink); background:transparent; color:var(--ink);
  padding:11px 18px; font-size:11px; letter-spacing:.16em; text-transform:uppercase; border-radius:2px; white-space:nowrap;
  transition:background .15s,color .15s,border-color .15s; }
.btn:hover{ background:var(--ink); color:var(--ivory); }
.btn:disabled{ opacity:.5; cursor:default; }
.btn.primary{ background:var(--cherry); border-color:var(--cherry); color:#fff; }
.btn.primary:hover{ background:#5c060b; }
.btn.small{ padding:8px 13px; font-size:10px; }
.btn.ghost{ border-color:var(--line-strong); color:var(--rose); }
.btn.ghost:hover{ background:var(--blush); color:var(--ink); border-color:var(--rose); }
.btn.chip{ border-radius:20px; }

/* presets */
.presets{ display:flex; gap:9px; flex-wrap:wrap; margin-bottom:16px; }
.presets .lbl{ align-self:center; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--rose); margin-right:4px; }
.preset{ border:1px solid var(--line-strong); background:var(--card); color:var(--ink); padding:8px 14px; border-radius:20px; font-size:12.5px; transition:background .15s,border-color .15s; }
.preset:hover{ background:var(--blush); border-color:var(--rose); }
.preset.active{ background:var(--ink); color:var(--ivory); border-color:var(--ink); }

/* search panel */
.search{ background:var(--card); border:1px solid var(--line); border-radius:4px; padding:20px clamp(14px,2.2vw,22px); }
.route-row{ display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:end; }
.field{ position:relative; display:flex; flex-direction:column; }
.field label{ font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--rose); margin-bottom:6px; }
.field input, .field select{ width:100%; padding:11px 12px; border:1px solid var(--line-strong); border-radius:2px; background:#fff; color:var(--ink); font-family:var(--sans); font-size:15px; }
.field input:focus, .field select:focus{ outline:none; border-color:var(--cherry); }
.swap{ align-self:end; margin-bottom:2px; width:40px; height:42px; border:1px solid var(--line-strong); background:#fff; border-radius:2px; font-size:16px; color:var(--rose); }
.swap:hover{ border-color:var(--rose); background:var(--blush); }
.opts-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-top:14px; }
.pax{ display:flex; align-items:center; gap:0; border:1px solid var(--line-strong); border-radius:2px; background:#fff; overflow:hidden; }
.pax button{ width:38px; height:42px; background:transparent; font-size:18px; color:var(--rose); }
.pax button:hover{ background:var(--blush); }
.pax .n{ flex:1; text-align:center; font-size:15px; }
.oneway{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--rose); margin-top:2px; }
.search-actions{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; align-items:center; }
.reset-wrap{ position:relative; margin-left:auto; }
.reset-menu{ position:absolute; right:0; top:100%; margin-top:6px; z-index:var(--z-menu); background:#fff; border:1px solid var(--line-strong); border-radius:3px; box-shadow:0 12px 26px rgba(33,31,28,.12); min-width:190px; overflow:hidden; }
.reset-menu.hidden{ display:none; }
.reset-menu button{ display:block; width:100%; text-align:left; padding:11px 15px; background:transparent; font-size:13px; border-bottom:1px solid var(--line); }
.reset-menu button:last-child{ border-bottom:none; }
.reset-menu button:hover{ background:var(--blush); }
.reset-menu button.restore{ color:var(--cherry); }

/* autocomplete */
.ac-menu{ position:absolute; top:100%; left:0; right:0; z-index:var(--z-menu); background:#fff; border:1px solid var(--line-strong); border-top:none; border-radius:0 0 3px 3px; max-height:240px; overflow:auto; box-shadow:0 10px 24px rgba(33,31,28,.12); }
.ac-menu.hidden{ display:none; }
.ac-item{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:9px 12px; cursor:pointer; border-bottom:1px solid var(--line); }
.ac-item:last-child{ border-bottom:none; }
.ac-item:hover, .ac-item.active{ background:var(--blush); }
.ac-item.active{ box-shadow:inset 3px 0 0 var(--cherry); }
.ac-item .code{ font-family:var(--serif); color:var(--cherry); font-size:14px; }
.ac-item .nm{ color:var(--rose); font-size:12px; text-align:right; }

/* notices */
.notice{ margin-top:18px; border:1px solid var(--line-strong); border-radius:3px; padding:16px 18px; background:var(--card); }
.notice.warn{ border-color:var(--warn); background:rgba(154,107,30,.06); }
.notice h4{ font-family:var(--serif); font-weight:400; font-size:18px; margin-bottom:6px; }
.notice p{ font-size:13.5px; }
.notice code{ font-family:ui-monospace,Menlo,monospace; font-size:12px; background:rgba(168,131,125,.16); padding:2px 6px; border-radius:3px; }

/* calendar strip */
.section-h{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:34px 0 12px; flex-wrap:wrap; }
.section-h h3{ font-family:var(--serif); font-weight:200; font-size:23px; }
.section-h .sub{ font-size:12.5px; color:var(--rose); }
.cal{ display:flex; align-items:stretch; gap:8px; }
.cal .nav{ flex:0 0 auto; width:40px; border:1px solid var(--line-strong); background:var(--card); border-radius:2px; font-size:16px; color:var(--rose); }
.cal .nav:hover:not(:disabled){ background:var(--blush); border-color:var(--rose); }
.cal .nav:disabled{ opacity:.4; }
.cal .track{ display:flex; gap:8px; overflow-x:auto; flex:1; padding-bottom:2px; scroll-snap-type:x proximity; }
.cal .day{ scroll-snap-align:start; flex:0 0 auto; min-width:96px; border:1px solid var(--line); background:var(--card); border-radius:3px; padding:10px 12px; text-align:center; cursor:pointer; transition:border-color .15s, background .15s; }
.cal .day:hover{ border-color:var(--rose); }
.cal .day.active{ border-color:var(--cherry); background:#fff; }
.cal .day.cheapest{ box-shadow:inset 0 0 0 1px var(--good); }
.cal .day .d{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--rose); }
.cal .day .p{ font-family:var(--serif); font-weight:200; font-size:19px; margin-top:5px; }
.cal .day .p.lo{ color:var(--good); }
.cal-empty{ font-size:13px; color:var(--rose); padding:10px 0; }

/* results toolbar */
.res-head{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin:34px 0 4px; flex-wrap:wrap; }
.res-head h3{ font-family:var(--serif); font-weight:200; font-size:23px; }
.res-sub{ font-size:12.5px; color:var(--rose); margin-bottom:14px; }
.filters{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
.filters .fl{ display:flex; flex-direction:column; }
.filters label{ font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--rose); margin-bottom:4px; }
.filters select, .filters input{ padding:8px 10px; border:1px solid var(--line-strong); border-radius:2px; background:#fff; font-size:13px; font-family:var(--sans); }
.filters .toggle{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--ink); align-self:end; padding-bottom:8px; }

/* flight cards */
.cards{ display:flex; flex-direction:column; gap:12px; }
.fcard{ background:#fff; border:1px solid var(--line); border-radius:4px; padding:16px 18px; display:grid; grid-template-columns:1fr auto; gap:16px; align-items:center; }
.fcard.best{ border-color:var(--cherry); box-shadow:0 0 0 1px rgba(116,7,14,.12); }
.fc-main{ min-width:0; }
.fc-airline{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.fc-airline img{ width:26px; height:26px; object-fit:contain; border-radius:4px; background:var(--ivory); }
.fc-airline .nm{ font-family:var(--serif); font-size:16px; }
.fc-airline .fn{ font-size:11.5px; color:var(--rose); letter-spacing:.04em; }
.leg{ display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; padding:7px 0; }
.leg + .leg{ border-top:1px dashed var(--line); }
.leg .pt{ text-align:center; }
.leg .pt .t{ font-family:var(--serif); font-size:19px; line-height:1; }
.leg .pt .a{ font-size:11px; letter-spacing:.1em; color:var(--rose); margin-top:3px; }
.leg .mid{ text-align:center; color:var(--rose); }
.leg .mid .dur{ font-size:12px; }
.leg .mid .bar{ height:1px; background:var(--line-strong); margin:5px 6px; position:relative; }
.leg .mid .bar::after{ content:''; position:absolute; right:-1px; top:-2px; width:5px; height:5px; border-radius:50%; background:var(--rose); }
.leg .mid .st{ font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; }
.leg .mid .st.nonstop{ color:var(--good); }
.leg .plus{ font-size:10px; color:var(--cherry); vertical-align:super; }
.fc-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:11px; }
.tag{ font-size:10.5px; letter-spacing:.06em; border:1px solid var(--line); border-radius:20px; padding:4px 10px; color:var(--rose); }
.tag.ok{ color:var(--good); border-color:rgba(47,111,79,.4); }
.tag.no{ color:var(--rose); }
.fc-side{ text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:8px; min-width:120px; }
.fc-price{ font-family:var(--serif); font-weight:200; font-size:30px; line-height:1; }
.fc-side .via{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--rose); }
.fc-badges{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:9px; }
.badge{ font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; padding:4px 10px; border-radius:20px; font-weight:600; }
.badge.rec{ background:var(--cherry); color:#fff; }
.badge.val{ background:var(--ink); color:var(--ivory); }
.badge.cheap{ background:rgba(47,111,79,.14); color:var(--good); border:1px solid rgba(47,111,79,.4); }
.badge.fast{ background:var(--blush); color:var(--ink); }
.fc-side .book{ display:inline-flex; align-items:center; justify-content:center; gap:7px; background:var(--cherry); border:1px solid var(--cherry); color:#fff; padding:12px 20px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; border-radius:2px; width:100%; transition:background .15s; }
.fc-side .book:hover{ background:#5c060b; color:#fff; }
.fc-side .row2{ display:flex; gap:8px; align-items:center; width:100%; }
.fc-side .row2 .cmp{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--rose); cursor:pointer; white-space:nowrap; }
.fc-side .track2{ font-size:11px; color:var(--rose); text-decoration:underline; text-underline-offset:2px; background:none; border:none; padding:0; }
.fcard.rec{ border-color:var(--cherry); box-shadow:0 0 0 1px rgba(116,7,14,.14); }
@media (max-width:640px){ .fcard{ grid-template-columns:1fr; } .fc-side{ align-items:stretch; text-align:left; width:100%; border-top:1px solid var(--line); padding-top:14px; }
  .fc-side .fc-price{ font-size:26px; } .fc-side .book{ font-size:12px; padding:14px; } }

/* recommended journey */
.journey{ background:var(--ink-s); color:var(--ivory); border-radius:5px; padding:26px clamp(16px,3vw,30px); margin:34px 0 0; }
.journey .eyebrow{ color:#B4938C; }
.journey h3{ font-family:var(--serif); font-weight:200; font-size:clamp(24px,3vw,32px); margin:6px 0 6px; }
.journey p{ font-size:13.5px; color:#D8CCC4; max-width:640px; }
.jflow{ display:flex; align-items:stretch; gap:8px; margin-top:20px; flex-wrap:wrap; }
.jleg{ flex:1 1 150px; min-width:130px; background:rgba(242,236,225,.06); border:1px solid rgba(242,236,225,.14); border-radius:3px; padding:13px 14px; text-align:left; color:var(--ivory); cursor:pointer; transition:background .15s, border-color .15s; }
.jleg:hover{ background:rgba(242,236,225,.12); border-color:#B4938C; }
.jleg .r{ font-family:var(--serif); font-size:17px; }
.jleg .d{ font-size:11px; color:#C6ADA5; margin-top:4px; letter-spacing:.04em; }
.jleg .go{ font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#D5847A; margin-top:8px; }
.jarrow{ align-self:center; color:#8a6a62; font-size:16px; }
@media (max-width:720px){ .jflow{ flex-direction:column; } .jarrow{ transform:rotate(90deg); align-self:flex-start; margin-left:20px; } }

/* comparison */
.compare{ margin-top:26px; background:var(--card); border:1px solid var(--cherry); border-radius:5px; padding:20px; }
.compare h3{ font-family:var(--serif); font-weight:200; font-size:22px; margin-bottom:4px; }
.cmp-grid{ display:grid; grid-auto-flow:column; grid-auto-columns:minmax(180px,1fr); gap:14px; overflow-x:auto; margin-top:14px; }
.cmp-col{ border:1px solid var(--line); border-radius:4px; padding:14px; background:#fff; display:flex; flex-direction:column; gap:8px; }
.cmp-col.win{ border-color:var(--cherry); }
.cmp-col .al{ display:flex; align-items:center; gap:8px; font-family:var(--serif); font-size:15px; }
.cmp-col .al img{ width:22px; height:22px; object-fit:contain; }
.cmp-col .pr{ font-family:var(--serif); font-weight:200; font-size:26px; }
.cmp-row{ display:flex; justify-content:space-between; font-size:12px; border-top:1px solid var(--line); padding-top:6px; }
.cmp-row .k{ color:var(--rose); }
.cmp-col .book{ margin-top:auto; background:var(--cherry); color:#fff; border:none; padding:10px; border-radius:2px; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; text-align:center; }
.cmp-clear{ background:none; border:none; color:var(--rose); font-size:11px; text-decoration:underline; cursor:pointer; }

/* states */
.state{ background:var(--card); border:1px solid var(--line); border-radius:4px; padding:34px 22px; text-align:center; color:var(--rose); }
.state .serif{ font-size:24px; color:var(--ink); margin-bottom:8px; }
.spin{ display:inline-block; width:14px; height:14px; border:2px solid var(--rose); border-top-color:transparent; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:8px; }
@keyframes sp{ to{ transform:rotate(360deg); } }
.skel{ height:96px; border-radius:4px; background:linear-gradient(90deg,var(--card),#fff,var(--card)); background-size:200% 100%; animation:sh 1.2s linear infinite; border:1px solid var(--line); margin-bottom:12px; }
@keyframes sh{ to{ background-position:-200% 0; } }

/* tracking */
.tracked{ margin-top:44px; border-top:1px solid var(--line); padding-top:26px; }
.tracked-list{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
.tchip{ border:1px solid var(--line); background:var(--card); border-radius:3px; padding:11px 14px; text-align:left; min-width:150px; }
.tchip:hover{ border-color:var(--rose); }
.tchip.active{ border-color:var(--cherry); background:#fff; }
.tchip .r{ font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--rose); }
.tchip .pr{ font-family:var(--serif); font-size:19px; margin-top:3px; }
.tchip .tr{ font-size:11px; margin-top:2px; }
.tr.fall{ color:var(--good); } .tr.rise{ color:var(--cherry); }
.chart-card{ background:var(--card); border:1px solid var(--line); border-radius:3px; padding:18px; margin-top:16px; }
svg.chart{ display:block; width:100%; height:180px; }
.chart .gl{ stroke:var(--line); } .chart .pl{ fill:none; stroke:var(--cherry-photo); stroke-width:2; }
.chart .ar{ fill:rgba(179,58,63,.10); } .chart .dot{ fill:var(--cherry); } .chart .lbl{ font-size:10px; fill:var(--rose); }
.foot{ margin-top:40px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--rose); line-height:1.7; max-width:820px; }
.foot strong{ color:var(--ink); }

/* ---- flight market dashboard (live monitored routes) ---- */
.market{ margin:30px 0 0; }
.mkt-head{ display:flex; align-items:baseline; justify-content:space-between; gap:12px 20px; flex-wrap:wrap; margin-bottom:5px; }
.mkt-head h3{ font-family:var(--serif); font-weight:200; font-size:clamp(23px,2.7vw,32px); }
.mkt-head .asof{ font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--rose); display:inline-flex; align-items:center; gap:7px; }
.mkt-head .asof .live{ width:7px; height:7px; border-radius:50%; background:var(--good); box-shadow:0 0 0 0 rgba(47,111,79,.5); animation:live 2s ease-out infinite; }
@keyframes live{ 0%{ box-shadow:0 0 0 0 rgba(47,111,79,.45);} 70%{ box-shadow:0 0 0 6px rgba(47,111,79,0);} 100%{ box-shadow:0 0 0 0 rgba(47,111,79,0);} }
.mkt-sub{ font-size:12.5px; color:var(--rose); margin-bottom:16px; max-width:620px; }
.mkt-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(236px,1fr)); gap:12px; }
.mcard{ background:var(--card); border:1px solid var(--line); border-radius:5px; padding:15px 16px 14px; display:flex; flex-direction:column; gap:11px; text-align:left; width:100%;
  transition:transform .2s cubic-bezier(.2,.7,.2,1), box-shadow .2s, border-color .2s; }
.mcard:hover{ transform:translateY(-3px); border-color:var(--line-strong); box-shadow:0 12px 30px rgba(33,31,28,.10); }
.mcard .m-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.mcard .m-flag{ font-size:18px; line-height:1; }
.mcard .m-city{ font-size:11.5px; color:var(--rose); letter-spacing:.02em; }
.mcard .m-pair{ font-family:var(--serif); font-size:15.5px; letter-spacing:.03em; margin-top:1px; }
.mcard .m-trend{ font-size:15px; line-height:1; opacity:.9; }
.m-price-row{ display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; }
.mcard .m-price{ font-family:var(--serif); font-weight:200; font-size:29px; line-height:1; }
.mcard .m-price .cur{ font-size:16px; opacity:.6; }
.m-chg{ font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:3px; }
.m-chg.down{ color:var(--good); } .m-chg.up{ color:var(--cherry-photo); } .m-chg.flat{ color:var(--rose); }
.m-chg .arw{ display:inline-block; }
.m-chg.down .arw{ animation:bobD 1.9s ease-in-out infinite; }
.m-chg.up .arw{ animation:bobU 1.9s ease-in-out infinite; }
@keyframes bobD{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(2px);} }
@keyframes bobU{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-2px);} }
.m-dates{ font-size:12.5px; color:var(--ink); letter-spacing:.01em; }

<body>
<div class="topbar">
  <div class="brand">see you in laos<span class="dot">.</span><small>Flight Tracker · a wedding website tool</small></div>
  <a class="back" href="index.html">← Back to the website</a>
</div>
<main class="wrap" id="app"></main>

<script src="money.js"></script>
<script>
"use strict";
/* ============================================================================
   See You In Laos — Flight Tracker (modern search UX)
   UI → Travel Service (/api/travel, Cloudflare Worker) → Duffel adapter → Duffel.
   Real fares only. No simulated data. Token lives only as the Worker secret.
   ============================================================================ */
const API='/api/travel';
const KEY='svil_ft_v3';
const $=(s,r=document)=>r.querySelector(s);
const DAY=86400000;

const travel={
  async call(action,payload={}){ const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...payload})}); return r.json(); },
  status(){ return this.call('status'); },
  places(q){ return this.call('places',{query:{q}}); },
  search(query){ return this.call('search',{query}); },
  cheapestDates(query){ return this.call('cheapestDates',{query}); },
  saveTrip(trip){ return this.call('saveTrip',{trip}); },
  history(tripId){ return this.call('history',{tripId}); },
  market(refresh=true,currency){ return this.call('market',{refresh,query:{currency}}); },
  hotels(currency,nights){ return this.call('hotels',{query:{currency,nights}}); },
  rates(){ return this.call('rates'); },
};

/* ---------- helpers ---------- */
const iso=d=>d.toISOString().slice(0,10);
const parse=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(Date.UTC(y,m-1,d));};
const addDays=(s,n)=>iso(new Date(parse(s).getTime()+n*DAY));
const nights=(a,b)=>Math.round((parse(b)-parse(a))/DAY);
const todayISO=()=>iso(new Date());
const fmtDay=s=>s?parse(s).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',timeZone:'UTC'}):'—';
const fmtDayShort=s=>s?parse(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',timeZone:'UTC'}):'—';
const fmtDayY=s=>s?parse(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',timeZone:'UTC'}):'—';
const fmtT=at=>{try{return new Date(at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch{return '';}};
const fmtDur=m=>m?`${Math.floor(m/60)}h ${String(m%60).padStart(2,'0')}m`:'';
/* All formatting goes through the one Money library (money.js). `a` may be a
   number or a {amount,currency} object; server prices already carry their currency. */
const money=(a,c)=>Money.format(a, (a&&typeof a==='object'&&a.currency)||c||state.currency);
/* Display an already-fetched NATIVE value (e.g. stored EUR history) in the chosen
   currency, converting with the SERVER's rates (state.fxRates) via Money — the UI
   holds no rate table. Server-fetched market/search/hotel prices already arrive converted. */
const dispMoney=(amount,nativeCur='EUR')=>{ const m=Money.convertMoney({amount,currency:nativeCur}, state.currency, state.fxRates); return Money.formatMoney(m); };
const isConverted=()=>state.currency!=='EUR'; // Duffel/hotels feed EUR- or THB-native; EUR display never converts flights
const curNote=()=>isConverted()?`<span class="cur-note"><span class="approx">≈</span> Converted to ${esc(state.currency)} at the current rate; you book in the original currency.</span>`:'';
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dayOffset=(a,b)=>{try{const d=Math.round((new Date(b).setHours(0,0,0,0)-new Date(a).setHours(0,0,0,0))/DAY);return d>0?d:0;}catch{return 0;}};

/* ---------- defaults & presets (wedding) ---------- */
const DEFAULTS={ origin:'HAM', destination:'BKK', departDate:'2027-02-21', returnDate:'2027-03-10',
  nightsMin:16, nightsMax:18, adults:1, cabin:'Economy', maxStops:1, maxBudget:900, flexDays:3, oneWay:false };
const PRESETS=[
  { label:'Germany → Wedding', s:{origin:'HAM',destination:'BKK',departDate:'2027-02-21',returnDate:'2027-03-10',oneWay:false,nightsMin:16,nightsMax:18} },
  { label:'Bangkok → Wedding', s:{origin:'BKK',destination:'LPQ',departDate:'2027-02-27',returnDate:'2027-03-01',oneWay:false,nightsMin:1,nightsMax:4} },
  { label:'Return to Germany', s:{origin:'BKK',destination:'HAM',departDate:'2027-03-10',returnDate:null,oneWay:true} },
];
const DEFAULT_FILTERS={ sort:'price', maxStops:'any', maxPrice:'', refundableOnly:false };

/* ---------- market: monitored routes shown before any search ---------- */
/* Canonical Bangkok arrival (mirrors monitoredRoutes.WEDDING_DATES); used only as
   a safety fallback — market snapshots always carry their own exact dates. */
const WEDDING_ARRIVAL='2027-02-21';
const marketSampleDate=()=>WEDDING_ARRIVAL;
/* Country → preferred departure airports (first = default pick). Mirrors the
   backend country map; the journey stays generic and always editable. */
const COUNTRY_AIRPORTS={ '':['HAM'], DE:['HAM','FRA','MUC'], TN:['TUN'], GR:['ATH'], PT:['LIS'], US:['LAS'], JP:['NRT'] };
const COUNTRY_LABELS={ '':'Not set (generic)', DE:'Germany', TN:'Tunisia', GR:'Greece', PT:'Portugal', US:'United States', JP:'Japan' };
const homeAirport=()=> (COUNTRY_AIRPORTS[state.journeyCountry]||['HAM'])[0];
/* Default wedding-journey legs (intelligent defaults; the builder is fully editable). */
let _legSeq=0; const legId=()=>'l'+(Date.now().toString(36))+(_legSeq++);
function defaultJourney(){ const home=homeAirport(); return [
  { id:legId(), from:home,  to:'BKK', dep:'2027-02-21' },
  { id:legId(), from:'BKK', to:'LPQ', dep:'2027-02-27' },
  { id:legId(), from:'LPQ', to:'BKK', dep:'2027-03-01' },
  { id:legId(), from:'BKK', to:home,  dep:'2027-03-10' },
]; }

/* ---------- currency (provider-native first; app converts only as fallback) ---------- */
const CURRENCIES=[['USD','🇺🇸'],['EUR','🇪🇺'],['THB','🇹🇭']];
const CUR_FLAG={USD:'🇺🇸',EUR:'🇪🇺',THB:'🇹🇭'};
/* Exchange rates come from the server's ExchangeRateProvider via the `rates`
   action (state.fxRates) — no rates are hardcoded in the UI. Used only to display
   already-fetched NATIVE values (tracked routes / history) in the chosen currency;
   market/search/hotel prices are converted server-side. All formatting + this
   conversion go through the one Money library (money.js). */

/* ---------- state ---------- */
let state={ search:{...DEFAULTS}, filters:{...DEFAULT_FILTERS},
  results:{status:'idle',offers:[],error:null,forPair:null},
  calendar:{status:'idle',days:[]},
  market:{status:'idle',asOf:null,routes:[]},
  hotels:{status:'idle',list:[]}, fxRates:null,
  journeyCountry:'', journey:null, currency:'USD',
  tracked:[], selectedTrack:null, compare:[],
  backend:{reachable:false,configured:false,checked:false} };
state.journey=defaultJourney();
const totalDur=o=>o.outbound.durationMinutes+(o.inbound?o.inbound.durationMinutes:0);
const stopsOf=o=>Math.max(o.outbound.stops,o.inbound?o.inbound.stops:0);
function computeBadges(offers){
  if(!offers.length) return {};
  const byP=[...offers].sort((a,b)=>a.price.amount-b.price.amount);
  const byD=[...offers].sort((a,b)=>totalDur(a)-totalDur(b));
  const minP=byP[0].price.amount,maxP=byP[byP.length-1].price.amount;
  const minD=byD[0]?totalDur(byD[0]):0,maxD=byD[byD.length-1]?totalDur(byD[byD.length-1]):0;
  let best=null,bs=Infinity;
  offers.forEach(o=>{ const np=(o.price.amount-minP)/((maxP-minP)||1); const nd=(totalDur(o)-minD)/((maxD-minD)||1);
    const s=np*0.55+nd*0.3+stopsOf(o)*0.15; if(s<bs){bs=s;best=o.id;} });
  const third=byP.slice(0,Math.max(1,Math.ceil(byP.length/3)));
  const rec=[...third].sort((a,b)=>(stopsOf(a)-stopsOf(b))||(a.price.amount-b.price.amount))[0].id;
  return { cheapest:byP[0].id, fastest:byD[0].id, best, recommended:rec };
}
function toggleCompare(id){ const i=state.compare.indexOf(id); if(i>=0) state.compare.splice(i,1); else { if(state.compare.length>=4) state.compare.shift(); state.compare.push(id); } save(); render(); }
const bookingUrlOf=o=>o&&o.booking&&(o.booking.bookingUrl||o.booking.url)||null;
function bookOffer(id){ const o=(state.results.offers||[]).find(x=>x.id===id); const u=bookingUrlOf(o); if(u) window.open(u,'_blank','noopener'); }
function providerBrand(o){ return (o&&o.booking&&o.booking.branding)||{name:(o&&o.owner)||(o&&o.provider)||'',logoUrl:(o&&o.logoUrl)||null}; }
/* Provider choices for the SAME itinerary (multi-provider aware; today Duffel only). */
function providerChoices(offer){
  const key=offer.itineraryKey; if(!key) return [offer];
  const same=(state.results.offers||[]).filter(o=>o.itineraryKey===key);
  const byProv={}; same.forEach(o=>{ const p=o.provider; if(!byProv[p]||o.price.amount<byProv[p].price.amount) byProv[p]=o; });
  return Object.values(byProv).sort((a,b)=>a.price.amount-b.price.amount);
}

const SKEY='svil_ft_session';
function save(){
  localStorage.setItem(KEY,JSON.stringify({search:state.search,filters:state.filters,tracked:state.tracked,selectedTrack:state.selectedTrack,compare:state.compare,journeyCountry:state.journeyCountry,journey:state.journey,currency:state.currency}));
  saveSession();
}
/* Volatile session snapshot so the Back button / a reload restores the exact
   previous state (results, calendar, market, comparison, scroll) — never start over. */
function saveSession(){ try{ sessionStorage.setItem(SKEY,JSON.stringify({
  results:state.results, calendar:state.calendar, market:state.market, compare:state.compare, scrollY:window.scrollY })); }catch(e){} }
function load(){ try{const r=JSON.parse(localStorage.getItem(KEY)); if(r){ state.search={...DEFAULTS,...r.search}; state.filters={...DEFAULT_FILTERS,...r.filters}; state.tracked=r.tracked||[]; state.selectedTrack=r.selectedTrack||null; state.compare=r.compare||[]; state.journeyCountry=r.journeyCountry||''; if(Array.isArray(r.journey)&&r.journey.length) state.journey=r.journey; if(r.currency&&CUR_FLAG[r.currency]) state.currency=r.currency; }}catch(e){} }
function loadSession(){ try{const r=JSON.parse(sessionStorage.getItem(SKEY)); if(r){ if(r.results) state.results=r.results; if(r.calendar) state.calendar=r.calendar; if(r.market) state.market=r.market; if(r.compare) state.compare=r.compare; return r; }}catch(e){} return null; }
function presetActive(p){ const s=state.search; return s.origin===p.s.origin && s.destination===p.s.destination && s.departDate===(p.s.departDate) && (s.oneWay===!!p.s.oneWay); }

/* ---------- query builder ---------- */
function baseQuery(){ const s=state.search; return {
  origin:s.origin, destination:s.destination, departureDate:s.departDate, returnDate:s.oneWay?null:s.returnDate,
  adults:s.adults, cabin:s.cabin, maxStops:s.maxStops, currency:state.currency }; }
function calendarQuery(){ const s=state.search;
  // Compare nearby DEPARTURE days at one fixed trip length (fast + clear, one price per day).
  const base = (s.returnDate&&!s.oneWay)?nights(s.departDate,s.returnDate):Math.round((s.nightsMin+s.nightsMax)/2);
  return { ...baseQuery(),
    departureRange:`${addDays(s.departDate,-s.flexDays)},${addDays(s.departDate,s.flexDays)}`,
    durationDays:`${base},${base}`, lenMin:base, lenMax:base }; }

/* ============================================================================
   ACTIONS
   ============================================================================ */
async function refreshBackend(){
  try{ const s=await travel.status(); state.backend={reachable:true,configured:!!s.configured,checked:true}; }
  catch(e){ state.backend={reachable:false,configured:false,checked:true}; }
}
async function runSearch(){
  if(!(state.backend.reachable&&state.backend.configured)) return;
  const s=state.search;
  state.results={status:'loading',offers:[],error:null,forPair:{depart:s.departDate,return:s.oneWay?null:s.returnDate}};
  if(!s.oneWay) state.calendar={status:'loading',days:[]};
  render();
  // flight cards for the exact pair
  try{
    const r=await travel.search(baseQuery());
    if(r.status==='not_configured'){ state.backend.configured=false; }
    else if(r.status==='ok'){ state.results={status:(r.data&&r.data.length)?'ok':'empty',offers:r.data||[],error:null,forPair:{depart:s.departDate,return:s.oneWay?null:s.returnDate}}; }
    else { state.results={status:'error',offers:[],error:(r.code===429?'The provider is rate-limiting right now. Try again in a moment.':(r.message||(r.errors&&r.errors.join('; '))||'Search failed.')),forPair:null}; }
  }catch(e){ state.backend.reachable=false; state.results={status:'error',offers:[],error:'Travel Service not reachable.'}; }
  render();
  // calendar (round-trip only)
  if(!s.oneWay){ loadCalendar(); }
  else { state.calendar={status:'idle',days:[]}; }
}
async function loadCalendar(){
  try{
    const r=await travel.cheapestDates(calendarQuery());
    if(r.status==='ok'){
      const byDep={};
      (r.data||[]).forEach(c=>{ const cur=byDep[c.departureDate]; if(!cur||c.price.amount<cur.price.amount) byDep[c.departureDate]=c; });
      const days=Object.values(byDep).sort((a,b)=>a.departureDate.localeCompare(b.departureDate));
      state.calendar={status:days.length?'ok':'empty',days};
    } else state.calendar={status:'empty',days:[]};
  }catch(e){ state.calendar={status:'empty',days:[]}; }
  render();
}
function applyPreset(p){ state.search={...DEFAULTS,...state.search,...p.s}; if(p.s.oneWay) state.search.returnDate=null; save(); runSearch(); }
function pickDate(day){ state.search.departDate=day.departureDate; if(day.returnDate) state.search.returnDate=day.returnDate; save(); runSearch(); }
function shiftDay(delta){ state.search.departDate=addDays(state.search.departDate,delta); if(!state.search.oneWay&&state.search.returnDate) state.search.returnDate=addDays(state.search.returnDate,delta); save(); runSearch(); }

/* ---------- flight market dashboard ---------- */
async function loadMarket(){
  if(!(state.backend.reachable&&state.backend.configured)) return;
  if(state.market.status==='loading') return;
  const had=state.market.routes.length;
  state.market={...state.market,status:had?'ok':'loading'}; render();
  try{
    const r=await travel.market(true,state.currency);
    if(r&&r.status==='ok') state.market={status:'ok',asOf:r.asOf,routes:r.routes||[]};
    else state.market={status:'empty',asOf:null,routes:r&&r.routes||[]};
  }catch(e){ state.market={...state.market,status:had?'ok':'error'}; }
  save(); render();
}
/* "View live fares" on a market card → load the EXACT dates shown on the card
   (the same query behind the quoted price) into the search and run it. Editable after. */
function applyMarketRoute(id){
  const r=(state.market.routes||[]).find(x=>x.id===id); if(!r) return;
  const c=r.current||{};
  const dep=c.departureDate||marketSampleDate();
  const oneWay=c.oneWay!=null?!!c.oneWay:true;
  const s={...state.search,origin:r.origin,destination:r.destination,departDate:dep,oneWay,returnDate:oneWay?null:(c.returnDate||null)};
  if(!oneWay&&c.nights){ s.nightsMin=c.nights; s.nightsMax=c.nights; }
  state.search=s; save(); runSearch(); scrollToResults();
}

/* tracking (preserves saved-search + history + alerts) */
async function trackCurrent(){
  const s=state.search;
  const best=filteredOffers()[0];
  const id='t'+(s.origin+s.destination+s.departDate).replace(/[^A-Za-z0-9]/g,'');
  let t=state.tracked.find(x=>x.id===id);
  if(!t){ t={id,name:`${s.origin} → ${s.destination}`,origin:s.origin,destination:s.destination,departure:s.departDate,return:s.oneWay?null:s.returnDate,
    flexDays:s.flexDays,lenMin:s.nightsMin,lenMax:s.nightsMax,cabin:s.cabin,maxStops:s.maxStops,currency:'EUR',
    notifyBelow:best?Math.round(best.price.amount*0.95):s.maxBudget,history:[],alertsEnabled:false}; state.tracked.push(t); }
  if(best){ t.history=(t.history||[]).filter(h=>h.date!==todayISO()); t.history.push({date:todayISO(),price:best.price.amount,currency:best.price.currency,departureDate:best.outbound.from.at.slice(0,10),returnDate:t.return}); }
  state.selectedTrack=id; save(); render();
  try{ const r=await travel.saveTrip(t); t.alertsEnabled=r.status==='ok'; save(); render(); }catch(e){}
}
async function selectTrack(id){ state.selectedTrack=id; save(); render();
  const t=state.tracked.find(x=>x.id===id); if(!t) return;
  try{ const r=await travel.history(id); if(r.status==='ok'&&Array.isArray(r.data)&&r.data.length){ const by={}; (t.history||[]).forEach(h=>by[h.date]=h); r.data.forEach(h=>by[h.date]=h); t.history=Object.values(by).sort((a,b)=>a.date.localeCompare(b.date)); save(); render(); } }catch(e){}
}
function removeTrack(id){ state.tracked=state.tracked.filter(x=>x.id!==id); if(state.selectedTrack===id) state.selectedTrack=null; save(); render(); }

/* ---------- client-side filtering (independent, no re-fetch) ---------- */
const SORTS=[['price','Lowest price'],['duration','Shortest duration'],['stops','Fewest stops'],['best','Best overall'],['depart','Earliest departure'],['late','Latest departure']];
function bestScore(o,all){
  const P=all.map(x=>x.price.amount),D=all.map(totalDur);
  const minP=Math.min(...P),maxP=Math.max(...P),minD=Math.min(...D),maxD=Math.max(...D);
  const np=(o.price.amount-minP)/((maxP-minP)||1), nd=(totalDur(o)-minD)/((maxD-minD)||1);
  return np*0.55+nd*0.3+stopsOf(o)*0.15;
}
function filteredOffers(){
  let o=[...state.results.offers]; const f=state.filters;
  if(f.maxStops!=='any'){ const m=Number(f.maxStops); o=o.filter(x=>Math.max(x.outbound.stops,x.inbound?x.inbound.stops:0)<=m); }
  if(f.maxPrice) o=o.filter(x=>x.price.amount<=Number(f.maxPrice));
  if(f.refundableOnly) o=o.filter(x=>x.conditions&&x.conditions.refundable);
  const all=o, sort=f.sort;
  o.sort((a,b)=> sort==='duration'?(totalDur(a)-totalDur(b))
    : sort==='stops'?((stopsOf(a)-stopsOf(b))||(a.price.amount-b.price.amount))
    : sort==='best'?(bestScore(a,all)-bestScore(b,all))
    : sort==='depart'?(new Date(a.outbound.from.at)-new Date(b.outbound.from.at))
    : sort==='late'?(new Date(b.outbound.from.at)-new Date(a.outbound.from.at))
    : (a.price.amount-b.price.amount));
  return o;
}

/* ---------- flight market dashboard (live monitored routes) ---------- */
function sparkSVG(spark){
  const W=100,H=30,pad=3;
  if(!spark||!spark.length) return `<svg class="mspark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><line class="base" x1="0" y1="${H-pad}" x2="${W}" y2="${H-pad}"/></svg>`;
  if(spark.length===1){ const y=H/2; return `<svg class="mspark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><line class="base" x1="0" y1="${y}" x2="${W}" y2="${y}"/><circle class="dt" cx="${W-4}" cy="${y}" r="2.4"/></svg>`; }
  const min=Math.min(...spark),max=Math.max(...spark),rng=(max-min)||1;
  const pts=spark.map((v,i)=>{ const x=pad+(i*(W-2*pad))/(spark.length-1); const y=H-pad-((v-min)/rng)*(H-2*pad); return [x,y]; });
  const line=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area=`M${pts[0][0].toFixed(1)} ${H} `+pts.map(p=>`L${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ')+`L${pts[pts.length-1][0].toFixed(1)} ${H} Z`;
  const last=pts[pts.length-1];
  return `<svg class="mspark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path class="ar" d="${area}"/><path class="ln" d="${line}"/><circle class="dt" cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.2"/></svg>`;
}
function ago(ts){ if(!ts) return '—'; const s=Math.max(0,Date.now()-ts); const h=Math.floor(s/3600000); if(h>=24) return Math.floor(h/24)+'d ago'; if(h>=1) return h+'h ago'; const m=Math.floor(s/60000); return m<=1?'just now':m+'m ago'; }
function marketCard(r){
  const c=r.current;
  const trendArrow=r.trend==='down'?'▼':r.trend==='up'?'▲':r.trend==='flat'?'▬':'';
  const chg=(r.change!=null&&r.changePct!=null)?`<span class="m-chg ${r.trend}"><span class="arw">${trendArrow}</span>${r.change<0?'−':r.change>0?'+':''}${money(Math.abs(r.change),c?c.currency:'EUR')} · ${r.changePct>0?'+':''}${r.changePct}%</span>`:'';
  const brand=c&&c.branding||{};
  const provRow=c?`<span class="m-prov">${brand.logoUrl?`<img src="${esc(brand.logoUrl)}" alt="" onerror="this.style.display='none'">`:''}${esc(brand.name||c.provider||'')}</span>`:'';
  const priceBlock=c?`<div class="m-price-row"><span class="m-price">${money(c.price,c.currency)}</span>${chg}</div>`
    :`<div class="m-price-row"><span class="m-price" style="opacity:.4">—</span></div>`;
  const dates=marketDates(c);
  const itin=marketItin(c);
  const stat=`<span class="m-stat ${r.status}">${r.status==='ok'?'● Live':c?'● Collecting':'● No data'}</span>`;
  const meta = c
    ? `<div class="m-meta">${stat}<span><b>${c.offers}</b> live offers</span><span>updated ${ago(c.ts)}</span></div>`
    : `<div class="m-meta">${stat}</div>`;
  return `<button type="button" class="mcard" data-mroute="${esc(r.id)}">
    <div class="m-top">
      <div><div class="m-city">${r.flag} ${esc(r.originCity)}</div><div class="m-pair">${esc(r.origin)} → ${esc(r.destination)}</div></div>
      <div class="m-trend">${provRow}</div>
    </div>
    ${priceBlock}
    ${dates}
    ${itin}
    ${sparkSVG(r.spark)}
    ${meta}
    ${marketInsight(r)}
    <span class="m-cta">View live fares →</span>
  </button>`;
}
/* The exact travel dates behind a card's price (matches the Duffel search). */
function marketDates(c){
  if(!c||!c.departureDate) return '';
  if(c.oneWay||!c.returnDate) return `<div class="m-dates">${esc(fmtDayY(c.departureDate))}<span class="sub">One way</span></div>`;
  const n=c.nights!=null?c.nights:nights(c.departureDate,c.returnDate);
  return `<div class="m-dates">${esc(fmtDayShort(c.departureDate))} → ${esc(fmtDayY(c.returnDate))}<span class="sub">${n} night${n===1?'':'s'}</span></div>`;
}
/* Market Insight — real snapshot stats only; "Collecting history" until 2+ days. */
function marketInsight(r){
  const c=r.current; if(!c) return '';
  const cur=c.currency, ins=r.insight;
  if(!ins) return `<div class="m-insight"><div class="mi-h">Market insight</div><div class="mi-collect"><span class="pulse"></span>Collecting history…</div></div>`;
  const conf=ins.confidence, confLabel=conf.charAt(0).toUpperCase()+conf.slice(1);
  const avgCls=ins.vsAvgPct<=-0.5?'good':ins.vsAvgPct>=0.5?'up':'flat';
  const lowCls=ins.vsLow30Pct==null?'':(ins.vsLow30Pct<=0.5?'good':'up');
  const pct=v=>`${v>0?'+':''}${v}%`;
  return `<div class="m-insight">
    <div class="mi-h">Market insight</div>
    <div class="mi-row"><span class="k">This week</span><span>${money(ins.low7,cur)} – ${money(ins.high7,cur)}</span></div>
    <div class="mi-row"><span class="k">vs 7-day avg</span><span class="${avgCls}">${pct(ins.vsAvgPct)}</span></div>
    ${ins.vsLow30Pct!=null?`<div class="mi-row"><span class="k">vs 30-day low</span><span class="${lowCls}">${pct(ins.vsLow30Pct)}</span></div>`:''}
    <div class="mi-row"><span class="k">Confidence</span><span class="mi-conf ${conf}">${confLabel}</span></div>
  </div>`;
}
/* Stops + outbound duration of the priced itinerary (airline is shown top-right). */
function marketItin(c){
  if(!c||(c.stops==null&&!c.durationMinutes)) return '';
  const stops=c.stops==null?'':`<span class="${c.stops===0?'nonstop':''}">${c.stops===0?'Nonstop':c.stops+' stop'+(c.stops>1?'s':'')}</span>`;
  const dur=c.durationMinutes?`${fmtDur(c.durationMinutes)}`:'';
  return `<div class="m-itin">${[stops,dur].filter(Boolean).join(' · ')}</div>`;
}
function viewMarket(){

function flightCard(o,b){

    o.cabin?`<span class="tag">${esc(o.cabin)}</span>`:'',
    o.fareClass?`<span class="tag">Fare ${esc(o.fareClass)}</span>`:'',
    o.bagsIncluded!=null?`<span class="tag">${o.bagsIncluded} checked</span>`:'',

    cond.refundable?`<span class="tag ok">Refundable</span>`:`<span class="tag no">Non-refundable</span>`,
    cond.changeable?`<span class="tag ok">Changeable${cond.changePenalty?' '+money(cond.changePenalty):''}</span>`:'',

  const cmp=state.compare.includes(o.id);
  const choices=providerChoices(o);
  const provRow=choices.length>1?`<div class="provchips">${choices.map(pc=>{const pb=providerBrand(pc);return `<span class="provchip">${pb.logoUrl?`<img src="${esc(pb.logoUrl)}" alt="">`:''}${esc(pb.name)} · ${money(pc.price)}</span>`;}).join('')}</div>`:'';
  return `<article class="fcard ${o.id===b.recommended?'rec':''}">
    <div class="fc-main">
      ${badges?`<div class="fc-badges">${badges}</div>`:''}
      <div class="fc-airline">${o.logoUrl?`<img src="${esc(o.logoUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}<span class="nm">${esc(o.owner||o.outbound.carrierName)}</span><span class="fn">${esc(fn)}</span></div>
      ${legRow(o.outbound,'out')}${legRow(o.inbound,'return')}
      <div class="fc-tags">${tags}</div>

        <div class="r">${esc(t.origin)} → ${esc(t.destination)}</div><div class="pr">${m?dispMoney(m.today.price,m.today.currency||'EUR'):'—'}</div>
        <div class="tr ${tm?tm.cls:''}">${m?tm.arrow+' '+t.history.length+' check'+(t.history.length>1?'s':''):'saved'}${t.alertsEnabled?' · alerts on':''}</div></button>`;}).join('')}
      ${canTrack?`<button type="button" class="btn small" id="trackBtn" style="align-self:center">＋ Track current search</button>`:''}

function trackDetail(t){
  const m=metrics(t);
  return `<div class="chart-card">
    <div class="section-h" style="margin:0 0 6px"><h3 style="font-size:19px">${esc(t.name)} · price history</h3>
      <button type="button" class="btn ghost small" data-untrack="${t.id}">Stop tracking</button></div>
    ${m?`<div style="font-size:12.5px;color:var(--rose);margin-bottom:8px">Lowest ${money({amount:m.lowest,currency:m.today.currency})} · avg ${money({amount:m.avg,currency:m.today.currency})} · alert below ${money({amount:t.notifyBelow,currency:'EUR'})}${t.alertsEnabled?' · server alerts on':''}</div>`:''}
    ${chartSVG(t)}
  </div>`;
}

function metrics(t){ const h=t.history||[]; if(!h.length) return null; const p=h.map(x=>x.price);
  const tail=p.slice(-3),prev=p.slice(-6,-3); const a=tail.reduce((x,y)=>x+y,0)/Math.max(1,tail.length); const pr=prev.length?prev.reduce((x,y)=>x+y,0)/prev.length:a;
  return { today:h[h.length-1], lowest:Math.min(...p), avg:p.reduce((x,y)=>x+y,0)/p.length, trend:a<pr-4?'fall':a>pr+4?'rise':'flat' }; }
function trend(t){ return t==='fall'?{cls:'fall',arrow:'↘'}:t==='rise'?{cls:'rise',arrow:'↗'}:{cls:'',arrow:'→'}; }
function chartSVG(t){ const h=t.history||[]; if(h.length<2) return `<p style="color:var(--rose);font-size:13px">Not enough data yet — track over a few days to see the trend.</p>`;
  const W=760,H=170,pl=52,pr=12,pt=14,pb=24; const p=h.map(x=>x.price); let mn=Math.min(...p),mx=Math.max(...p); const sp=Math.max(1,mx-mn); mn-=sp*.15; mx+=sp*.15;
  const X=i=>pl+i*(W-pl-pr)/(h.length-1), Y=v=>pt+(1-(v-mn)/(mx-mn))*(H-pt-pb);
  const pts=h.map((d,i)=>[X(i),Y(d.price)]); const line=pts.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');
  const cur=h[h.length-1].currency||'EUR'; const fmt=v=>new Intl.NumberFormat('de-DE',{style:'currency',currency:cur,maximumFractionDigits:0}).format(v);
  const grid=[0,.5,1].map(f=>{const yv=mn+(mx-mn)*f,y=Y(yv);return `<line class="gl" x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}"/><text class="lbl" x="6" y="${y+3}">${fmt(yv)}</text>`;}).join('');
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Price history">${grid}<path class="ar" d="${line} L ${X(h.length-1).toFixed(1)} ${H-pb} L ${pl} ${H-pb} Z"/><path class="pl" d="${line}"/><circle class="dot" cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4"/></svg>`;
}

function viewFoot(){ return `<div class="foot"><strong>How fares are sourced.</strong> This screen calls the site's own Travel Service (<code>${API}</code>, a Cloudflare Worker), which calls <strong>Duffel</strong> through a replaceable adapter. Airlines, flight numbers, times, connections, baggage, cabins, fare conditions and prices are <strong>real Duffel data</strong>; the app owns the search, filters, tracking and alerts. The provider token lives only as a server secret; the browser never sees it.</div>`; }

   WIRE
   ============================================================================ */
function wire(){
  document.querySelectorAll('#app [data-ac]').forEach(attachAutocomplete);
  document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>applyPreset(PRESETS[+b.dataset.preset]));
  $('#swap')&&($('#swap').onclick=()=>{const s=state.search;[s.origin,s.destination]=[s.destination,s.origin];save();render();});
  $('#searchBtn')&&($('#searchBtn').onclick=commitAndSearch);
  // field bindings
  const bind=(id,fn)=>{const e=$(id);if(e)e.onchange=()=>{fn(e.value);save();};};
  bind('#f-dep',v=>state.search.departDate=v);
  bind('#f-ret',v=>state.search.returnDate=v||null);
  bind('#f-cabin',v=>state.search.cabin=v);
  bind('#f-stops',v=>state.search.maxStops=Number(v));
  bind('#f-lmin',v=>state.search.nightsMin=Number(v)||1);
  bind('#f-lmax',v=>state.search.nightsMax=Number(v)||1);
  bind('#f-flex',v=>state.search.flexDays=Math.max(0,Math.min(7,Number(v)||0)));
  bind('#f-budget',v=>state.search.maxBudget=Number(v)||0);
  $('#f-oneway')&&($('#f-oneway').onchange=e=>{state.search.oneWay=e.target.checked;if(e.target.checked)state.search.returnDate=null;save();render();});
  $('#paxDec')&&($('#paxDec').onclick=()=>{state.search.adults=Math.max(1,state.search.adults-1);save();render();});
  $('#paxInc')&&($('#paxInc').onclick=()=>{state.search.adults=Math.min(9,state.search.adults+1);save();render();});
  // reset menu
  $('#resetBtn')&&($('#resetBtn').onclick=e=>{e.stopPropagation();$('#resetMenu').classList.toggle('hidden');});
  document.querySelectorAll('[data-reset]').forEach(b=>b.onclick=()=>{({dates:clearDates,airports:clearAirports,filters:clearFilters,defaults:restoreDefaults})[b.dataset.reset]();});
  document.addEventListener('click',()=>{const m=$('#resetMenu');if(m)m.classList.add('hidden');},{once:true});
  // calendar
  $('#cal-prev')&&($('#cal-prev').onclick=()=>shiftDay(-1));
  $('#cal-next')&&($('#cal-next').onclick=()=>shiftDay(1));
  document.querySelectorAll('[data-cal]').forEach(b=>b.onclick=()=>{const[dep,ret]=b.dataset.cal.split('|');pickDate({departureDate:dep,returnDate:ret||null});});
  // filters (client-side, no re-fetch)
  const flt=(id,fn)=>{const e=$(id);if(e)e.onchange=()=>{fn(e.type==='checkbox'?e.checked:e.value);save();render();};};
  flt('#fl-sort',v=>state.filters.sort=v); flt('#fl-stops',v=>state.filters.maxStops=v);
  flt('#fl-price',v=>state.filters.maxPrice=v); flt('#fl-refund',v=>state.filters.refundableOnly=v);
  // tracking
  $('#trackBtn')&&($('#trackBtn').onclick=trackCurrent);
  document.querySelectorAll('[data-track-offer]').forEach(b=>b.onclick=trackCurrent);
  document.querySelectorAll('[data-track]').forEach(b=>b.onclick=()=>selectTrack(b.dataset.track));
  document.querySelectorAll('[data-untrack]').forEach(b=>b.onclick=()=>removeTrack(b.dataset.untrack));
  // booking + compare
  document.querySelectorAll('[data-book]').forEach(b=>b.onclick=()=>bookOffer(b.dataset.book));
  document.querySelectorAll('[data-cmp]').forEach(b=>b.onchange=()=>toggleCompare(b.dataset.cmp));
  $('#cmp-clear')&&($('#cmp-clear').onclick=()=>{state.compare=[];save();render();});
  // currency
  document.querySelectorAll('[data-cur]').forEach(b=>b.onclick=()=>setCurrency(b.dataset.cur));
  // market dashboard
  document.querySelectorAll('[data-mroute]').forEach(b=>b.onclick=()=>applyMarketRoute(b.dataset.mroute));
  // hotel booking (opens the provider in a new tab)
  document.querySelectorAll('[data-hbook]').forEach(b=>b.onclick=()=>{const u=b.dataset.hbook;if(u)window.open(u,'_blank','noopener');});
  // editable journey builder
  document.querySelectorAll('.jac').forEach(attachJourneyAC);
  document.querySelectorAll('.jrow input[type="date"][data-jset]').forEach(inp=>inp.onchange=()=>{const[id,f]=inp.dataset.jset.split(':');editLeg(id,f,inp.value);});
  document.querySelectorAll('[data-jswap]').forEach(b=>b.onclick=()=>swapLeg(b.dataset.jswap));
  document.querySelectorAll('[data-jdup]').forEach(b=>b.onclick=()=>duplicateLeg(b.dataset.jdup));
  document.querySelectorAll('[data-jdel]').forEach(b=>b.onclick=()=>deleteLeg(b.dataset.jdel));
  document.querySelectorAll('[data-jsearch]').forEach(b=>b.onclick=()=>searchLeg(b.dataset.jsearch));
  $('#jb-add')&&($('#jb-add').onclick=addLeg);
  $('#j-country')&&($('#j-country').onchange=e=>setCountry(e.target.value));
}
/* ---------- accessible airport autocomplete (WAI-ARIA combobox) ----------
   One keyboard-navigable, screen-reader-friendly combobox used by BOTH the search
   fields and the journey-leg fields. Arrow keys move the active option, Enter
   selects it, Escape closes, Home/End jump, mouse still works. The input is a
   role=combobox with aria-expanded + aria-activedescendant; the menu is a
   role=listbox of role=option items. */
let _acSeq=0;
function attachAirportAC(input, opts){
  if(input._ac) return; input._ac=true;
  const on=opts||{};
  const menuId='ac-menu-'+(_acSeq++);
  const menu=document.createElement('div'); menu.className='ac-menu hidden'; menu.id=menuId; menu.setAttribute('role','listbox');
  input.parentElement.appendChild(menu);
  input.setAttribute('role','combobox'); input.setAttribute('aria-autocomplete','list');
  input.setAttribute('aria-expanded','false'); input.setAttribute('aria-controls',menuId);
  let items=[], active=-1, deb;
  const isOpen=()=>!menu.classList.contains('hidden');
  const hide=()=>{ menu.classList.add('hidden'); menu.innerHTML=''; items=[]; active=-1; input.setAttribute('aria-expanded','false'); input.removeAttribute('aria-activedescendant'); };
  const paint=()=>{ [...menu.children].forEach((el,i)=>{ const sel=i===active; el.classList.toggle('active',sel); el.setAttribute('aria-selected',sel?'true':'false'); if(sel){ input.setAttribute('aria-activedescendant',el.id); el.scrollIntoView({block:'nearest'}); } }); if(active<0) input.removeAttribute('aria-activedescendant'); };
  const choose=p=>{ if(!p) return; input.value=p.iata; on.onChoose&&on.onChoose(p); hide(); };
  const build=()=>{ menu.innerHTML=items.map((p,i)=>`<div class="ac-item" role="option" id="${menuId}-o${i}"><span class="code">${esc(p.iata)}</span><span class="nm">${esc(p.name)}${p.city&&p.city!==p.name?' · '+esc(p.city):''}</span></div>`).join(''); [...menu.children].forEach((el,i)=>{ el.addEventListener('mousedown',e=>{e.preventDefault();choose(items[i]);}); el.addEventListener('mousemove',()=>{ if(active!==i){active=i;paint();} }); }); active=-1; };
  input.addEventListener('input',()=>{ clearTimeout(deb); const q=input.value.trim(); on.onInput&&on.onInput(q); if(q.length<2){ hide(); return; }
    deb=setTimeout(async()=>{ try{ const r=await travel.places(q); items=(r&&r.status==='ok'&&Array.isArray(r.data))?r.data.slice(0,7):[]; if(!items.length){ hide(); return; }
      build(); menu.classList.remove('hidden'); input.setAttribute('aria-expanded','true'); }catch(e){ hide(); } },250); });
  input.addEventListener('keydown',e=>{
    if(e.key==='ArrowDown'){ if(isOpen()&&items.length){ e.preventDefault(); active=(active+1)%items.length; paint(); } }
    else if(e.key==='ArrowUp'){ if(isOpen()&&items.length){ e.preventDefault(); active=(active-1+items.length)%items.length; paint(); } }
    else if(e.key==='Home'){ if(isOpen()&&items.length){ e.preventDefault(); active=0; paint(); } }
    else if(e.key==='End'){ if(isOpen()&&items.length){ e.preventDefault(); active=items.length-1; paint(); } }
    else if(e.key==='Enter'){ if(isOpen()&&items.length){ e.preventDefault(); choose(items[active>=0?active:0]); } }
    else if(e.key==='Escape'){ if(isOpen()){ e.preventDefault(); e.stopPropagation(); hide(); } }
  });
  input.addEventListener('blur',()=>setTimeout(()=>{ const v=input.value.trim(); if(v&&!/^[A-Za-z]{3}$/.test(v)&&items.length) choose(items[active>=0?active:0]); else { on.onBlur&&on.onBlur(v); } hide(); },160));
}
/* journey-leg airport fields */
function attachJourneyAC(input){
  const [id,field]=input.dataset.jset.split(':');
  attachAirportAC(input,{ onChoose:p=>editLeg(id,field,p.iata), onInput:q=>editLeg(id,field,q), onBlur:v=>editLeg(id,field,v.toUpperCase()) });
}
function commitAndSearch(){
  // pull latest field values (in case not blurred) then search
  const g=id=>$(id)&&$(id).value;
  state.search.origin=(g('#f-origin')||state.search.origin).trim().toUpperCase();
  state.search.destination=(g('#f-dest')||state.search.destination).trim().toUpperCase();
  if(g('#f-dep'))state.search.departDate=g('#f-dep');
  if(g('#f-ret')&&!state.search.oneWay)state.search.returnDate=g('#f-ret');
  save(); runSearch();
}

/* ---------- search origin/destination fields (Duffel Places) ---------- */
function attachAutocomplete(input){
  const key=input.id==='f-origin'?'origin':'destination';
  attachAirportAC(input,{ onChoose:p=>{ state.search[key]=p.iata; save(); }, onBlur:v=>{ input.value=v.toUpperCase(); state.search[key]=v.toUpperCase(); save(); } });
}

/* ---------- persistence: keep scroll position + restore on back/reload ---------- */
let _scrollT;
window.addEventListener('scroll',()=>{ clearTimeout(_scrollT); _scrollT=setTimeout(saveSession,300); },{passive:true});
window.addEventListener('pagehide',saveSession);
function restoreScroll(y){ if(!y) return; let n=0; const t=setInterval(()=>{ window.scrollTo(0,y); if(++n>10||Math.abs(window.scrollY-y)<4) clearInterval(t); },40); }

/* ---------- boot ---------- */
load();
const _sess=loadSession();
render();
refreshBackend().then(()=>{
  render();
  if(state.backend.reachable&&state.backend.configured){
    loadRates();                                    // current FX table (for native-value display)
    loadHotels();                                   // curated stays, same currency layer
    loadMarket();                                   // live market dashboard (seeds/refreshes)
    const restored=_sess&&_sess.results&&(_sess.results.status==='ok'||_sess.results.status==='empty')&&_sess.results.offers&&_sess.results.offers.length;
    if(restored){ render(); restoreScroll(_sess.scrollY); }   // never start over
    else runSearch();                               // fresh visit → search the wedding default
  }
});
</script>
