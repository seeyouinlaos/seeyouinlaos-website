# Netlify configuration for the See You In Laos wedding website + Flight Tracker.
# The static site is served from this directory; the Travel Service runs as
# serverless functions (so provider API keys are NEVER exposed to the browser).

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Real "checks every day" loop for server-side price monitoring + alerts.
# Adjust the cron as needed (e.g. "0 */6 * * *" for every 6 hours).
[functions."travel-cron"]
  schedule = "@daily"
